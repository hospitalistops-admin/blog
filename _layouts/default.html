<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <nav class="nav-container">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <span class="logo-mark">H</span>
        <span class="logo-text">{{ site.title }}</span>
      </a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Writing</a>
        <a href="{{ '/about' | relative_url }}">About</a>
      </div>
    </nav>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-container">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author.name }}. Built with data and curiosity.</p>
    </div>
  </footer>
</body>
</html>
