<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
  {% seo %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/game.css' | relative_url }}">
</head>
<body>
  <header class="game-header">
    <nav class="game-nav">
      <a href="{{ '/' | relative_url }}" class="game-logo">
        <span class="logo-mark">H</span>
        <span class="logo-text">{{ site.title }}</span>
      </a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Writing</a>
        <a href="{{ '/interactives/bayesian-game' | relative_url }}" class="nav-active">Play</a>
        <a href="{{ '/about' | relative_url }}">About</a>
      </div>
    </nav>
  </header>

  {{ content }}

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
  <script src="{{ '/assets/js/bayesian-game.js' | relative_url }}"></script>
</body>
</html>
